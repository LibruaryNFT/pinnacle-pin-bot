name: Deploy to Hetzner VPS

on:
  push:
    branches: [main, master]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore']
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: echo 'No tests yet — CI validates install'

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VAULTOPOLIS_VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 -H ${{ secrets.VAULTOPOLIS_VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -p 2222 -i ~/.ssh/deploy_key root@${{ secrets.VAULTOPOLIS_VPS_HOST }} '
            git config --global --add safe.directory /opt/pinnacle-pin-bot &&
            cd /opt/pinnacle-pin-bot &&
            git reset --hard HEAD &&
            git pull origin main &&
            chown -R nodeservices:nodeservices /opt/pinnacle-pin-bot &&
            npm install --production &&
            chown -R nodeservices:nodeservices /opt/pinnacle-pin-bot &&
            cp /opt/pinnacle-pin-bot/deploy/pinnacle-pin-bot.service /etc/systemd/system/pinnacle-pin-bot.service &&
            systemctl daemon-reload &&
            systemctl restart pinnacle-pin-bot
          '

      - name: Health check (status + SHA match)
        env:
          SHA: ${{ github.sha }}
        run: |
          sleep 10
          BODY=$(ssh -p 2222 -i ~/.ssh/deploy_key root@${{ secrets.VAULTOPOLIS_VPS_HOST }} \
            'curl -sf http://localhost:8092/health')
          echo "$BODY" | python3 -m json.tool
          GOT_SHA=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))")
          if [ "$GOT_SHA" != "$SHA" ]; then
            echo "::error::running SHA ($GOT_SHA) != shipped $SHA — restart did not pick up new code"; exit 1
          fi
          echo "Verified: running SHA matches $SHA"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
